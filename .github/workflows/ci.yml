name: ci

on:
  push:
    branches:
      - master
    paths:
      - '**'
      - '!README.md'
      - '!docs/**'
  pull_request:
    branches:
      - master
    paths:
      - '**'
      - '!README.md'
      - '!docs/**'
  workflow_dispatch:
    inputs:
      reason:
        description: "reason"
        required: false

permissions:
  contents: write

jobs:
  ubuntu-latest:
    name: ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: 'Cache: .nuke/temp, ~/.nuget/packages'
        uses: actions/cache@v4
        with:
          path: |
            .nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('global.json', 'Directory.Packages.props', '**/*.csproj') }}
      - name: 'Run: Pipeline'
        run: ./build.cmd Pipeline
        env:
          reason: ${{ github.event.inputs.reason }}
          CodecovToken: ${{ secrets.CODECOV_TOKEN }}
          ReleaseTagToken: ${{ secrets.RELEASE_TAG_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 'Publish: packages'
        uses: actions/upload-artifact@v5
        with:
          name: packages
          path: artifacts/packages
      - name: 'Publish: coverage.cobertura.xml'
        uses: actions/upload-artifact@v5
        with:
          name: coverage.cobertura.xml
          path: artifacts/coverage/coverage.cobertura.xml
